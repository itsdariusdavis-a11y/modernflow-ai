name: Probe endpoints (temporary)

on:
  push:
    branches: [main]
    paths: ["sports/scripts/probe.mjs", ".github/workflows/probe.yml"]
  workflow_dispatch:
    inputs:
      date:
        description: "Date YYYY-MM-DD (blank = today ET)"
        required: false

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node sports/scripts/probe.mjs ${{ inputs.date }}
