name: MLB dashboard — daily snapshot & Pages deploy

# Builds a fresh data snapshot from the MLB Stats API and publishes the
# self-contained dashboard (sports/live/) to GitHub Pages.
#
# - Runs on a daily schedule so the live page always reflects the current slate.
# - The snapshot is baked into the Pages artifact (not committed), so the repo
#   stays clean and every deploy is fresh.
# - configure-pages enables Pages automatically (no manual Settings toggle).
#
# Scheduled workflows only run from the DEFAULT branch (main), so this must live
# on main to auto-update daily.

on:
  schedule:
    # Several times a day (UTC) to pick up probable pitchers, lineups & results.
    - cron: "30 13 * * *" # ~9:30am ET
    - cron: "30 17 * * *" # ~1:30pm ET
    - cron: "30 22 * * *" # ~6:30pm ET
  push:
    branches: [main]
    paths:
      - "sports/live/**"
      - "sports/scripts/**"
      - ".github/workflows/deploy-sports.yml"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to snapshot (YYYY-MM-DD); blank = today (ET)"
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build daily snapshot from the MLB Stats API
        run: node sports/scripts/build-snapshot.mjs ${{ inputs.date }}

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: sports/live

      - id: deployment
        uses: actions/deploy-pages@v4
