name: MLB dashboard — daily snapshot & Pages deploy

# Builds a fresh data snapshot from the MLB Stats API and publishes the
# self-contained dashboard (sports/live/) to GitHub Pages.
#
# - Runs on a daily schedule so the live page always reflects the current slate.
# - The snapshot is baked into the Pages artifact (not committed), so the repo
#   stays clean and every deploy is fresh.
# - configure-pages enables Pages automatically (no manual Settings toggle).
#
# Scheduled workflows only run from the DEFAULT branch (main), so this must live
# on main to auto-update daily.

on:
  schedule:
    # Several times a day (UTC) to pick up probable pitchers, lineups & results.
    - cron: "30 13 * * *" # ~9:30am ET
    - cron: "30 17 * * *" # ~1:30pm ET
    - cron: "30 22 * * *" # ~6:30pm ET
  push:
    branches: [main]
    paths:
      - "sports/live/**"
      - "sports/scripts/**"
      - ".github/workflows/deploy-sports.yml"
      - "!sports/live/today.json" # avoid a commit loop from the step below
      - "!sports/live/data/**"
  workflow_dispatch:
    inputs:
      date:
        description: "Date to snapshot (YYYY-MM-DD); blank = today (ET)"
        required: false

permissions:
  contents: write # to commit the daily today.json snapshot
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build daily snapshot from the MLB Stats API
        run: node sports/scripts/build-snapshot.mjs ${{ inputs.date }}

      - name: Commit snapshot (served by githack)
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sports/live/today.json
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "chore: daily MLB snapshot [skip ci]"
            git push origin HEAD:main && echo "✅ snapshot committed" || echo "⚠️ snapshot push blocked"
          fi

      # The Pages steps below only succeed once GitHub Pages is enabled
      # (Settings → Pages → Source: "GitHub Actions"). Until then they're
      # allowed to fail softly so the daily run stays green instead of spamming
      # failures. The moment Pages is enabled, the next run deploys automatically.
      - uses: actions/configure-pages@v5
        id: configure
        continue-on-error: true

      - uses: actions/upload-pages-artifact@v3
        if: steps.configure.outcome == 'success'
        continue-on-error: true
        with:
          path: sports/live

      - id: deployment
        if: steps.configure.outcome == 'success'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Pages status
        run: |
          if [ "${{ steps.configure.outcome }}" = "success" ]; then
            echo "✅ Deployed to GitHub Pages: ${{ steps.deployment.outputs.page_url }}"
          else
            echo "ℹ️  GitHub Pages isn't enabled yet — snapshot built, deploy skipped."
            echo "    Enable it at Settings → Pages → Source: 'GitHub Actions', then re-run."
          fi

