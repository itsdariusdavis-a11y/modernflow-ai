<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLB Matchup Dashboard</title>
    <meta
      name="description"
      content="Daily MLB matchups: offense ranked 1-30 vs pitcher handedness (AVG/OPS/RPG), home/away, day/night, day-of-week records, and batter-vs-pitcher history."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%BE%3C/text%3E%3C/svg%3E"
    />
    <style>
      :root {
        --bg: #0b0f17; --bg-2: #121826; --card: #151c2c; --card-2: #1b2336;
        --border: #263149; --text: #e6eaf2; --muted: #94a3b8; --muted-2: #64748b;
        --accent: #38bdf8; --shadow: 0 6px 24px rgba(0,0,0,.35);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; color: var(--text);
        background: radial-gradient(1200px 600px at 50% -200px, #16233b 0%, var(--bg) 60%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      code { background: rgba(255,255,255,.06); padding: 1px 5px; border-radius: 4px; }
      .app { max-width: 1100px; margin: 0 auto; padding: 24px 16px 80px; }
      .app-header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
      .app-title { font-size: 22px; font-weight: 800; letter-spacing: -.02em; display: flex; align-items: center; gap: 10px; }
      .app-sub { color: var(--muted); font-size: 13px; margin: 6px 0 18px; max-width: 720px; }
      .datebar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
      .datebar button, .datebar input {
        background: var(--card); color: var(--text); border: 1px solid var(--border);
        border-radius: 8px; padding: 8px 12px; font-size: 14px; cursor: pointer;
      }
      .datebar input { cursor: text; }
      .datebar button:hover { border-color: var(--accent); }
      .updated { color: var(--muted-2); font-size: 12px; }
      .banner { border: 1px solid var(--border); background: var(--card); border-radius: 10px; padding: 10px 14px; font-size: 13px; color: var(--muted); margin-bottom: 16px; }
      .banner.warn { border-color: #7c5e12; background: #211b0c; color: #f3d9a0; }
      .banner.err { border-color: #7c2222; background: #210c0c; color: #f3a0a0; }
      .matchups { display: grid; gap: 16px; }
      .card { background: linear-gradient(180deg, var(--card) 0%, var(--bg-2) 100%); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; }
      .card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,.02); }
      .card-head .teams { font-weight: 700; font-size: 16px; }
      .card-head .meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .pill { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
      .pill.day { color: #fde68a; border-color: #6b5a16; }
      .pill.night { color: #a5b4fc; border-color: #3a3f6b; }
      .sides { display: grid; grid-template-columns: 1fr 1fr; }
      .side { padding: 14px 16px; }
      .side + .side { border-left: 1px solid var(--border); }
      .side-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
      .team-dot { width: 12px; height: 12px; border-radius: 3px; flex: none; }
      .team-name { font-weight: 700; font-size: 15px; }
      .ha-tag { font-size: 10px; font-weight: 700; letter-spacing: .06em; color: var(--muted-2); border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px; }
      .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted-2); margin: 12px 0 6px; }
      .offense { display: flex; align-items: center; gap: 12px; background: var(--card-2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
      .statline { display: flex; gap: 16px; }
      .stat { display: flex; flex-direction: column; }
      .stat .v { font-size: 17px; font-weight: 800; font-variant-numeric: tabular-nums; }
      .stat .k { font-size: 10px; color: var(--muted-2); text-transform: uppercase; letter-spacing: .06em; }
      .facing { font-size: 12px; color: var(--muted); margin-top: 6px; }
      .facing b { color: var(--text); }
      .rank { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 52px; border-radius: 10px; padding: 6px 4px; font-weight: 800; color: #06121f; }
      .rank .num { font-size: 20px; line-height: 1; }
      .rank .lbl { font-size: 9px; font-weight: 700; opacity: .8; margin-top: 2px; }
      .chips { display: flex; flex-wrap: wrap; gap: 6px; }
      .chip { display: flex; align-items: baseline; gap: 5px; background: var(--card-2); border: 1px solid var(--border); border-radius: 8px; padding: 5px 9px; font-size: 12px; }
      .chip .k { color: var(--muted-2); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
      .chip .v { font-weight: 700; font-variant-numeric: tabular-nums; }
      .chip.hl { border-color: var(--accent); }
      .expand-btn { width: 100%; text-align: left; background: rgba(255,255,255,.02); border: none; border-top: 1px solid var(--border); color: var(--accent); padding: 11px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
      .expand-btn:hover { background: rgba(56,189,248,.06); }
      .detail { padding: 4px 16px 16px; border-top: 1px solid var(--border); background: rgba(0,0,0,.15); }
      .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
      table.bvp { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 6px; }
      table.bvp th, table.bvp td { text-align: right; padding: 4px 6px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
      table.bvp th:first-child, table.bvp td:first-child { text-align: left; }
      table.bvp th { color: var(--muted-2); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
      table.bvp tr.team-row td { color: var(--accent); font-weight: 700; }
      .muted { color: var(--muted); }
      .loading, .empty { color: var(--muted); font-size: 13px; padding: 12px 0; }
      @media (max-width: 720px) {
        .sides, .detail-grid { grid-template-columns: 1fr; }
        .side + .side { border-left: none; border-top: 1px solid var(--border); }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="app-title">⚾ MLB Matchup Dashboard</div>
        <div class="datebar">
          <button id="prev">‹ Prev</button>
          <input id="date" type="date" />
          <button id="today">Today</button>
          <button id="next">Next ›</button>
          <button id="refresh" title="Force refresh">↻</button>
        </div>
      </header>
      <div class="app-sub">
        Offense ranked 1–30 vs the handedness of today’s opposing starter (AVG · OPS ·
        RPG), plus home/away, day/night and day-of-week records and batter-vs-pitcher
        history. Auto-refreshes each day. Source: MLB Stats API.
        <span class="updated" id="updated"></span>
      </div>
      <div id="banner"></div>
      <div id="content"><div class="loading">Loading today’s slate…</div></div>
    </div>

    <script>
      "use strict";

      // ---- Config ----------------------------------------------------------
      // Override with ?api=https://your-proxy if statsapi.mlb.com is blocked.
      const API =
        new URLSearchParams(location.search).get("api") || "https://statsapi.mlb.com";
      const POOL = 6; // bounded concurrency for fan-out requests

      const TEAMS = [
        [110,"Baltimore Orioles","BAL","#DF4601"],[111,"Boston Red Sox","BOS","#BD3039"],
        [147,"New York Yankees","NYY","#003087"],[139,"Tampa Bay Rays","TB","#092C5C"],
        [141,"Toronto Blue Jays","TOR","#134A8E"],[145,"Chicago White Sox","CWS","#27251F"],
        [114,"Cleveland Guardians","CLE","#00385D"],[116,"Detroit Tigers","DET","#0C2340"],
        [118,"Kansas City Royals","KC","#004687"],[142,"Minnesota Twins","MIN","#002B5C"],
        [117,"Houston Astros","HOU","#002D62"],[108,"Los Angeles Angels","LAA","#BA0021"],
        [133,"Athletics","ATH","#003831"],[136,"Seattle Mariners","SEA","#0C2C56"],
        [140,"Texas Rangers","TEX","#003278"],[144,"Atlanta Braves","ATL","#CE1141"],
        [146,"Miami Marlins","MIA","#00A3E0"],[121,"New York Mets","NYM","#002D72"],
        [143,"Philadelphia Phillies","PHI","#E81828"],[120,"Washington Nationals","WSH","#AB0003"],
        [112,"Chicago Cubs","CHC","#0E3386"],[113,"Cincinnati Reds","CIN","#C6011F"],
        [158,"Milwaukee Brewers","MIL","#12284B"],[134,"Pittsburgh Pirates","PIT","#27251F"],
        [138,"St. Louis Cardinals","STL","#C41E3A"],[109,"Arizona Diamondbacks","ARI","#A71930"],
        [115,"Colorado Rockies","COL","#333366"],[119,"Los Angeles Dodgers","LAD","#005A9C"],
        [135,"San Diego Padres","SD","#2F241D"],[137,"San Francisco Giants","SF","#FD5A1E"],
      ];
      const TEAM_BY_ID = new Map(TEAMS.map((t) => [t[0], { id: t[0], name: t[1], abbr: t[2], color: t[3] }]));
      const teamMeta = (id) => TEAM_BY_ID.get(id) || { id, name: "Team " + id, abbr: String(id), color: "#64748b" };
      const WEEKDAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const HAND_LABEL = { L: "LHP", R: "RHP", S: "SHP" };

      // ---- Small helpers ---------------------------------------------------
      const el = (id) => document.getElementById(id);
      function isoDate(d = new Date()) {
        return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
      }
      function seasonOf(date) { return Number(date.slice(0,4)) || new Date().getFullYear(); }
      function fmtRate(n, digits = 3) {
        if (!isFinite(n) || n === 0) return "—";
        return n.toFixed(digits).replace(/^0/, "");
      }
      function toNum(v) {
        if (v == null || v === "-" || v === ".---") return 0;
        const n = Number(v); return isFinite(n) ? n : 0;
      }
      function fmtRec(r) { return r ? r.w + "-" + r.l : "—"; }
      function esc(s) { return String(s).replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c])); }
      function weekdayOf(officialDate) {
        const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(officialDate);
        if (!m) return WEEKDAYS[new Date().getUTCDay()];
        return WEEKDAYS[new Date(Date.UTC(+m[1], +m[2]-1, +m[3], 12)).getUTCDay()];
      }
      async function getJSON(path, params = {}) {
        const usp = new URLSearchParams(params);
        const res = await fetch(API + path + "?" + usp.toString());
        if (!res.ok) throw new Error("MLB Stats API " + res.status + " for " + path);
        return res.json();
      }
      async function mapPool(items, concurrency, fn) {
        const out = new Array(items.length);
        let i = 0;
        const workers = Array.from({ length: Math.min(concurrency, items.length) }, async () => {
          while (i < items.length) { const idx = i++; out[idx] = await fn(items[idx], idx); }
        });
        await Promise.all(workers);
        return out;
      }

      // ---- Data layer ------------------------------------------------------
      function getSchedule(date) {
        return getJSON("/api/v1/schedule", { sportId: 1, date, hydrate: "probablePitcher(note),linescore,team" });
      }
      function getStandings(season) {
        return getJSON("/api/v1/standings", { leagueId: "103,104", season, standingsTypes: "regularSeason" });
      }
      function getTeamSplits(teamId, season) {
        return getJSON("/api/v1/teams/" + teamId + "/stats", { stats: "statSplits", sitCodes: "vl,vr", group: "hitting", season, gameType: "R", sportId: 1 });
      }
      function getTeamSchedule(teamId, start, end) {
        return getJSON("/api/v1/schedule", { sportId: 1, teamId, startDate: start, endDate: end, gameType: "R" });
      }
      function getPeople(ids) { return getJSON("/api/v1/people", { personIds: ids.join(",") }); }
      function getPitcherVsTeam(pid, teamId) {
        return getJSON("/api/v1/people/" + pid + "/stats", { stats: "vsTeam", group: "pitching", opposingTeamId: teamId, sportId: 1 });
      }
      function getPitcherVsBatter(pid, batterId) {
        return getJSON("/api/v1/people/" + pid + "/stats", { stats: "vsPlayer", group: "pitching", opposingPlayerId: batterId, sportId: 1 });
      }
      async function getLineups(gamePk) {
        const box = await getJSON("/api/v1/game/" + gamePk + "/boxscore", {});
        const build = (t) => ({
          teamId: t.team.id,
          batters: (t.battingOrder || []).map((pid) => {
            const p = t.players["ID" + pid];
            return p ? { id: p.person.id, name: p.person.fullName } : null;
          }).filter(Boolean),
        });
        return { away: build(box.teams.away), home: build(box.teams.home) };
      }

      // ---- Analytics -------------------------------------------------------
      function parseTeamSplits(teamId, res) {
        const out = { L: null, R: null };
        const splits = (res.stats && res.stats[0] && res.stats[0].splits) || [];
        for (const s of splits) {
          const code = s.split && s.split.code;
          const hand = code === "vl" ? "L" : code === "vr" ? "R" : null;
          if (!hand) continue;
          const st = s.stat, g = st.gamesPlayed || 0;
          out[hand] = { teamId, avg: toNum(st.avg), ops: toNum(st.ops), runs: st.runs || 0, games: g, rpg: g > 0 ? (st.runs || 0) / g : 0 };
        }
        return out;
      }
      function buildRankings(teamSplits) {
        const rank = (hand) => {
          const lines = [...teamSplits.values()].map((s) => s[hand]).filter(Boolean).sort((a, b) => b.ops - a.ops);
          const map = new Map();
          lines.forEach((line, i) => map.set(line.teamId, Object.assign({}, line, { rank: i + 1 })));
          return map;
        };
        return { L: rank("L"), R: rank("R") };
      }
      function parseStandings(res) {
        const out = new Map();
        for (const lg of res.records || []) {
          for (const tr of lg.teamRecords || []) {
            const splits = (tr.records && tr.records.splitRecords) || [];
            const pick = (type) => { const s = splits.find((r) => r.type === type); return s ? { w: s.wins, l: s.losses } : { w: 0, l: 0 }; };
            out.set(tr.team.id, { overall: { w: tr.wins, l: tr.losses }, home: pick("home"), away: pick("away"), day: pick("day"), night: pick("night") });
          }
        }
        return out;
      }
      function weekdayRecords(teamId, res) {
        const week = {}; WEEKDAYS.forEach((d) => (week[d] = { w: 0, l: 0 }));
        for (const date of res.dates || []) {
          for (const g of date.games || []) {
            if (g.status.abstractGameState !== "Final") continue;
            const home = g.teams.home, away = g.teams.away;
            const isHome = home.team.id === teamId, isAway = away.team.id === teamId;
            if (!isHome && !isAway) continue;
            const hr = home.score != null ? home.score : g.linescore && g.linescore.teams && g.linescore.teams.home && g.linescore.teams.home.runs;
            const ar = away.score != null ? away.score : g.linescore && g.linescore.teams && g.linescore.teams.away && g.linescore.teams.away.runs;
            if (hr == null || ar == null || hr === ar) continue;
            const won = isHome ? hr > ar : ar > hr;
            const wd = weekdayOf(g.officialDate);
            won ? week[wd].w++ : week[wd].l++;
          }
        }
        return week;
      }
      function inferDayNight(iso) {
        const d = new Date(iso); if (isNaN(d)) return "night";
        const hourET = (d.getUTCHours() - 4 + 24) % 24; return hourET < 17 ? "day" : "night";
      }

      // ---- Orchestration (with per-day localStorage cache) -----------------
      const memCache = new Map();
      async function loadDay(date) {
        if (memCache.has(date)) return memCache.get(date);
        const cacheKey = "mlbdash:" + date;
        const season = seasonOf(date);
        const [schedule, standingsRes, splitsArr, weekdayArr] = await Promise.all([
          getSchedule(date),
          getStandings(season),
          mapPool(TEAMS, POOL, async (t) => [t[0], parseTeamSplits(t[0], await getTeamSplits(t[0], season))]),
          mapPool(TEAMS, POOL, async (t) => [t[0], weekdayRecords(t[0], await getTeamSchedule(t[0], season + "-03-01", date))]),
        ]);
        const teamSplits = new Map(splitsArr);
        const rankings = buildRankings(teamSplits);
        const records = parseStandings(standingsRes);
        const weekday = new Map(weekdayArr);

        const games = (schedule.dates && schedule.dates[0] && schedule.dates[0].games) || [];
        const ids = new Set();
        games.forEach((g) => {
          [g.teams.away.probablePitcher, g.teams.home.probablePitcher].forEach((p) => p && p.id && ids.add(p.id));
        });
        let people = new Map();
        if (ids.size) {
          try {
            const res = await getPeople([...ids]);
            res.people.forEach((p) => people.set(p.id, { id: p.id, name: p.fullName, hand: (p.pitchHand && p.pitchHand.code) || "R" }));
          } catch (e) { /* fall back to schedule handedness below */ }
        }
        const matchups = buildMatchups(games, people, rankings, records, weekday);
        const result = { matchups, ts: Date.now() };
        memCache.set(date, result);
        try { localStorage.setItem(cacheKey, JSON.stringify(result)); } catch (e) {}
        return result;
      }
      function cachedDay(date) {
        if (memCache.has(date)) return memCache.get(date);
        try { const raw = localStorage.getItem("mlbdash:" + date); if (raw) return JSON.parse(raw); } catch (e) {}
        return null;
      }

      function buildMatchups(games, people, rankings, records, weekday) {
        const pitcher = (p) => {
          if (!p || !p.id) return null;
          if (people.has(p.id)) return people.get(p.id);
          if (p.pitchHand && p.pitchHand.code) return { id: p.id, name: p.fullName, hand: p.pitchHand.code };
          return { id: p.id, name: p.fullName || "TBD", hand: "R" };
        };
        const rankFor = (teamId, hand) => (hand === "L" ? rankings.L : rankings.R).get(teamId) || null;
        return games.map((g) => {
          const awayP = pitcher(g.teams.away.probablePitcher);
          const homeP = pitcher(g.teams.home.probablePitcher);
          const side = (teamId, isHome, facing) => ({
            team: teamMeta(teamId), isHome,
            records: records.get(teamId) || null,
            weekday: weekday.get(teamId) || null,
            opposingPitcher: facing,
            offenseRank: facing ? rankFor(teamId, facing.hand) : null,
          });
          return {
            gamePk: g.gamePk,
            officialDate: g.officialDate,
            weekday: weekdayOf(g.officialDate),
            dayNight: g.dayNight || inferDayNight(g.gameDate),
            status: g.status.detailedState,
            venue: (g.venue && g.venue.name) || null,
            awayId: g.teams.away.team.id, homeId: g.teams.home.team.id,
            awayStarter: awayP, homeStarter: homeP,
            away: side(g.teams.away.team.id, false, homeP),
            home: side(g.teams.home.team.id, true, awayP),
          };
        });
      }

      // ---- Rendering -------------------------------------------------------
      function rankColor(rank) {
        const t = (rank - 1) / 29; return "hsl(" + (130 - t * 130) + ", 70%, 55%)";
      }
      function rankBadge(rank) {
        if (rank == null) return '<div class="rank" style="background:#334155;color:#cbd5e1"><span class="num">—</span><span class="lbl">N/A</span></div>';
        return '<div class="rank" style="background:' + rankColor(rank) + '"><span class="num">' + rank + '</span><span class="lbl">OF 30</span></div>';
      }
      function sideHTML(side, weekday, dayNight) {
        const hand = side.opposingPitcher && side.opposingPitcher.hand;
        const r = side.offenseRank;
        const ha = side.isHome ? side.records && side.records.home : side.records && side.records.away;
        const dn = dayNight === "day" ? side.records && side.records.day : side.records && side.records.night;
        const wd = side.weekday && side.weekday[weekday];
        const facing = side.opposingPitcher
          ? "Facing <b>" + esc(side.opposingPitcher.name) + "</b> (" + side.opposingPitcher.hand + "-handed)"
          : '<span class="muted">Probable starter not yet announced</span>';
        return (
          '<div class="side">' +
            '<div class="side-head"><span class="team-dot" style="background:' + side.team.color + '"></span>' +
              '<span class="team-name">' + esc(side.team.name) + '</span>' +
              '<span class="ha-tag">' + (side.isHome ? "HOME" : "AWAY") + '</span></div>' +
            '<div class="section-label">Offense ' + (hand ? "vs " + HAND_LABEL[hand] : "vs starter") + '</div>' +
            '<div class="offense">' + rankBadge(r ? r.rank : null) +
              '<div><div class="statline">' +
                '<div class="stat"><span class="v">' + fmtRate(r ? r.avg : 0) + '</span><span class="k">AVG</span></div>' +
                '<div class="stat"><span class="v">' + fmtRate(r ? r.ops : 0) + '</span><span class="k">OPS</span></div>' +
                '<div class="stat"><span class="v">' + (r ? r.rpg.toFixed(1) : "—") + '</span><span class="k">RPG</span></div>' +
              '</div><div class="facing">' + facing + '</div></div></div>' +
            '<div class="section-label">Situational records</div>' +
            '<div class="chips">' +
              chip("Overall", fmtRec(side.records && side.records.overall)) +
              chip(side.isHome ? "Home" : "Away", fmtRec(ha), true) +
              chip(dayNight === "day" ? "Day" : "Night", fmtRec(dn), true) +
              chip(weekday.slice(0, 3) + ".", fmtRec(wd), true) +
            '</div></div>'
        );
      }
      function chip(k, v, hl) {
        return '<div class="chip' + (hl ? " hl" : "") + '"><span class="k">' + k + '</span><span class="v">' + v + '</span></div>';
      }
      function cardHTML(m) {
        const tod = m.dayNight || "night";
        return (
          '<div class="card" data-game="' + m.gamePk + '">' +
            '<div class="card-head"><div class="teams">' + m.away.team.abbr + ' <span class="muted">@</span> ' + m.home.team.abbr + '</div>' +
              '<div class="meta">' +
                (m.venue ? '<span class="pill">' + esc(m.venue) + '</span>' : "") +
                '<span class="pill">' + m.weekday + '</span>' +
                '<span class="pill ' + tod + '">' + (tod === "day" ? "☀ Day game" : "☾ Night game") + '</span>' +
                '<span class="pill">' + esc(m.status) + '</span>' +
              '</div></div>' +
            '<div class="sides">' + sideHTML(m.away, m.weekday, tod) + sideHTML(m.home, m.weekday, tod) + '</div>' +
            '<button class="expand-btn" data-expand="' + m.gamePk + '">▸ Show pitching matchups & batter-vs-pitcher</button>' +
            '<div class="detail-host"></div>' +
          '</div>'
        );
      }

      function render(matchups, date) {
        const content = el("content");
        if (!matchups.length) { content.innerHTML = '<div class="empty">No games scheduled for ' + date + '.</div>'; return; }
        content.innerHTML = '<div class="matchups">' + matchups.map(cardHTML).join("") + "</div>";
        CURRENT = new Map(matchups.map((m) => [String(m.gamePk), m]));
      }
      let CURRENT = new Map();

      // ---- Batter-vs-pitcher (lazy, on expand) -----------------------------
      function parsePitcherLine(res, label) {
        const splits = (res.stats && res.stats[0] && res.stats[0].splits) || [];
        if (!splits.length) return { label, bf: 0, ab: 0, avg: "—", ops: "—", hr: 0, k: 0, bb: 0 };
        const s = splits[splits.length - 1].stat;
        return { label, bf: s.battersFaced || 0, ab: s.atBats || 0, avg: s.avg || "—", ops: s.ops || "—", hr: s.homeRuns || 0, k: s.strikeOuts || 0, bb: s.baseOnBalls || 0 };
      }
      async function pitcherBlock(pitcher, starterTeam, opponentTeamId, batters) {
        if (!pitcher) return '<div><div class="section-label">' + esc(starterTeam) + ' starter</div><div class="empty">Probable starter not yet announced.</div></div>';
        const opp = teamMeta(opponentTeamId);
        let rows = "";
        const vsTeam = await getPitcherVsTeam(pitcher.id, opponentTeamId).then((r) => parsePitcherLine(r, "team")).catch(() => null);
        rows += '<tr class="team-row"><td>vs ' + opp.abbr + ' (career)</td><td>' + (vsTeam && vsTeam.bf || "—") + '</td><td>' + (vsTeam ? vsTeam.avg : "—") + '</td><td>' + (vsTeam ? vsTeam.ops : "—") + '</td><td>' + (vsTeam ? vsTeam.hr : "—") + '</td><td>' + (vsTeam ? vsTeam.k : "—") + '</td><td>' + (vsTeam ? vsTeam.bb : "—") + '</td></tr>';
        if (batters.length) {
          const lines = await mapPool(batters, 4, async (b) => {
            const line = await getPitcherVsBatter(pitcher.id, b.id).then((r) => parsePitcherLine(r, b.name)).catch(() => null);
            return { b, line };
          });
          rows += lines.map(({ b, line }) =>
            '<tr><td>' + esc(b.name) + '</td><td>' + (line && (line.ab || line.bf) || "—") + '</td><td>' + (line ? line.avg : "—") + '</td><td>' + (line ? line.ops : "—") + '</td><td>' + (line ? line.hr : "—") + '</td><td>' + (line ? line.k : "—") + '</td><td>' + (line ? line.bb : "—") + '</td></tr>'
          ).join("");
        } else {
          rows += '<tr><td colspan="7" class="empty">Lineup not posted yet — showing team-level history.</td></tr>';
        }
        return (
          '<div><div class="section-label">' + esc(starterTeam) + ' — ' + esc(pitcher.name) + ' (' + pitcher.hand + 'HP) vs ' + esc(opp.name) + '</div>' +
          '<table class="bvp"><thead><tr><th>Opponent / Batter</th><th>PA/BF</th><th>AVG</th><th>OPS</th><th>HR</th><th>K</th><th>BB</th></tr></thead><tbody>' + rows + '</tbody></table></div>'
        );
      }
      async function expand(gamePk, host) {
        const m = CURRENT.get(String(gamePk));
        if (!m) return;
        host.innerHTML = '<div class="detail"><div class="loading">Loading pitcher history & batter-vs-pitcher…</div></div>';
        try {
          let away = [], home = [];
          try { const lu = await getLineups(gamePk); away = lu.away.batters; home = lu.home.batters; } catch (e) {}
          const [awayHTML, homeHTML] = await Promise.all([
            pitcherBlock(m.awayStarter, m.away.team.name, m.homeId, home), // away starter faces home lineup
            pitcherBlock(m.homeStarter, m.home.team.name, m.awayId, away), // home starter faces away lineup
          ]);
          host.innerHTML = '<div class="detail"><div class="detail-grid">' + awayHTML + homeHTML + '</div></div>';
        } catch (e) {
          host.innerHTML = '<div class="detail"><div class="empty">Couldn’t load pitching detail.</div></div>';
        }
      }

      // ---- App shell -------------------------------------------------------
      let DATE = isoDate();
      function setBanner(html, cls) { el("banner").innerHTML = html ? '<div class="banner ' + (cls || "") + '">' + html + "</div>" : ""; }
      function setUpdated(ts) { el("updated").textContent = ts ? " · updated " + new Date(ts).toLocaleTimeString() : ""; }

      async function show(date, force) {
        DATE = date; el("date").value = date;
        const cached = !force && cachedDay(date);
        if (cached) { render(cached.matchups, date); setUpdated(cached.ts); }
        else { el("content").innerHTML = '<div class="loading">Loading slate for ' + date + '…</div>'; }
        setBanner("");
        try {
          const data = await loadDay(date);
          render(data.matchups, date); setUpdated(data.ts);
        } catch (e) {
          if (!cached) {
            setBanner('Could not reach the MLB Stats API (<code>' + esc(API) + '</code>). If it is blocked, append <code>?api=YOUR_PROXY</code> to the URL.', "err");
            el("content").innerHTML = '<div class="empty">No data.</div>';
          } else {
            setBanner("Showing cached data — couldn’t refresh from the API.", "warn");
          }
        }
      }

      function shift(days) {
        const d = new Date(DATE + "T12:00:00"); d.setDate(d.getDate() + days); show(isoDate(d));
      }
      el("prev").onclick = () => shift(-1);
      el("next").onclick = () => shift(1);
      el("today").onclick = () => show(isoDate());
      el("refresh").onclick = () => show(DATE, true);
      el("date").onchange = (e) => e.target.value && show(e.target.value);
      el("content").addEventListener("click", (ev) => {
        const btn = ev.target.closest("[data-expand]");
        if (!btn) return;
        const card = btn.closest(".card");
        const host = card.querySelector(".detail-host");
        if (host.dataset.open === "1") { host.innerHTML = ""; host.dataset.open = "0"; btn.textContent = "▸ Show pitching matchups & batter-vs-pitcher"; return; }
        host.dataset.open = "1"; btn.textContent = "▾ Hide pitching matchups (BvP)";
        expand(btn.getAttribute("data-expand"), host);
      });

      // Auto-roll to the new day: if the viewer leaves the tab open past midnight
      // while viewing "today", refresh to the new slate automatically.
      let lastSeenToday = isoDate();
      setInterval(() => {
        const now = isoDate();
        if (now !== lastSeenToday) {
          const wasToday = DATE === lastSeenToday;
          lastSeenToday = now;
          if (wasToday) show(now, true); // viewer was on today's slate -> roll forward
        }
      }, 60 * 1000);

      show(DATE);
    </script>
  </body>
</html>
